services:

  spark:
    build: .
    container_name: spark-local
    ports:
      - "4040:4040"
    volumes:
      - .:/workspace
    working_dir: /workspace
    tty: true

    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}

    depends_on:
      - kafka

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "9092:9092"